<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PressPilot — DCKAY Agency</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PressPilot">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <!-- CSS load order: tokens → layout → components → tables → responsive → features -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/tables.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/cdf.css">
  <link rel="stylesheet" href="/css/articles.css">
  <link rel="stylesheet" href="/css/settings.css">
  <link rel="stylesheet" href="/css/team.css">
</head>
<body>

<div id="app-shell">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <nav id="sidebar" role="navigation" aria-label="Navigation principale">
    <!-- Brand -->
    <div class="sidebar-brand">
      <button id="sidebar-toggle-btn" class="sidebar-toggle" title="Réduire la sidebar" aria-label="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="3" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="11.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
      <div class="sidebar-brand-text">
        <span class="brand-name">PressPilot</span>
        <span class="brand-agency">DCKAY Agency</span>
      </div>
    </div>

    <!-- Nav items -->
    <div class="sidebar-nav">
      <button class="nav-item" data-route="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-route="articles">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Articles</span>
      </button>
      <button class="nav-item" data-route="magazines">
        <span class="nav-icon">📰</span>
        <span class="nav-label">Magazines</span>
      </button>
      <button class="nav-item" data-route="calendar">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Calendrier</span>
      </button>
      <button class="nav-item" data-route="billing">
        <span class="nav-icon">💶</span>
        <span class="nav-label">Facturation</span>
      </button>
      <button class="nav-item" data-route="team">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Équipe</span>
      </button>
      <button class="nav-item" data-route="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Paramètres</span>
      </button>
    </div>

    <!-- Footer logout -->
    <div class="sidebar-footer">
      <a href="/logout" class="btn-logout" title="Déconnexion">
        <span class="nav-icon">⎋</span>
        <span class="btn-logout-label">Déconnexion</span>
      </a>
    </div>
  </nav>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay"></div>

  <!-- ── MAIN AREA ────────────────────────────────────────── -->
  <div id="main-area">

    <!-- Top bar -->
    <header id="topbar">
      <button id="topbar-burger" aria-label="Menu">☰</button>
      <span id="topbar-title">PressPilot</span>

      <!-- Stats bar (inline in topbar on larger screens via CSS, or below) -->
      <!-- Global search hint for Cmd+K -->
      <div id="topbar-search-wrap">
        <input type="text" id="topbar-search" placeholder="Rechercher…" readonly
               style="cursor:pointer" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true}))">
      </div>

      <div id="topbar-actions">
        <span id="topbar-cmd-hint" title="Ouvrir la palette de commandes">⌘K</span>
      </div>
    </header>

    <!-- Stats bar -->
    <div id="stats-bar"></div>

    <!-- Content area — modules are mounted here -->
    <div id="content-area" role="main"></div>

  </div>
</div>

<!-- Persistent toast -->
<div id="undo-toast" class="undo-toast" style="display:none">
  <span id="undo-msg"></span>
  <button id="btn-undo" class="btn btn-ghost btn-sm" style="display:none">↩ Annuler</button>
  <button id="btn-undo-dismiss" class="toast-dismiss" title="Fermer">×</button>
</div>

<!-- Main JS entry point (ES module) -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
